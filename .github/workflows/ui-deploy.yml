name: UI Package Release

on:
  push:
    branches: [main]
    paths:
      - 'packages/ui/**'
      - 'packages/cli/**'
      - '.changeset/**'
      - '!packages/ui/**/*.md'

jobs:
  release:
    name: Release to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@marmoui'
          cache: 'pnpm'

      # Trusted Publishing (OIDC) needs npm >= 11.5; publishes are authorized
      # by this workflow's identity — no NPM_TOKEN secret anywhere.
      - name: Update npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        # marmoui (packages/cli) is plain JS with no build step.
        run: pnpm --filter @marmoui/ui build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          commit: 'chore: version packages'
          title: 'Version Packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # npm auth comes from OIDC Trusted Publishing (id-token: write above),
          # configured per package on npmjs.com → Settings → Trusted Publisher.
